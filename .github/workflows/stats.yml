name: Continuous measurements

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Reruns of one commit replace the same observation paths, so serialise those.
# Different commits write disjoint paths and reconcile stats-data push races in
# the persistence job below.
concurrency:
  group: continuous-measurements-${{ github.sha }}
  cancel-in-progress: false

# Measurement is read-only. The two jobs that mutate GitHub state override this
# with only the permissions their respective boundaries require.
permissions:
  contents: read

jobs:
  measure:
    name: Measure parser, resolution, and references
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Move /nix and cargo's target/ to the large /mnt disk
        run: |
          df -h / /mnt || true
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
          sudo mkdir -p /mnt/cargo-target
          sudo chown "$(id -u):$(id -g)" /mnt/cargo-target
          mkdir -p "$GITHUB_WORKSPACE/target"
          sudo mount --bind /mnt/cargo-target "$GITHUB_WORKSPACE/target"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cargo target/
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cmd-format: nix develop -c {0}
          save-if: true

      - name: Generate parser divergence report
        run: |
          nix develop --command env \
            BORZOI_DIVERGENCE_OUT="$RUNNER_TEMP/reports/parser-divergence" \
            cargo test -p borzoi-cst --test all \
            fcs_divergence::regenerate_fcs_divergence -- --ignored --nocapture

      - name: Generate resolution divergence report
        # Pin the sampling knobs explicitly. A change starts a new series because
        # the configuration is part of the series identity.
        run: |
          nix develop --command env \
            BORZOI_RESOLVE_DIVERGENCE_OUT="$RUNNER_TEMP/reports/resolution-divergence" \
            BORZOI_RESOLVE_DIFF_STRIDE=13 \
            cargo test -p borzoi-sema --test all \
            resolve_divergence::regenerate_resolution_divergence_report \
            -- --ignored --nocapture

      - name: Generate find-references differential report
        # Keep the sampling configuration explicit so a change starts a new
        # comparable series rather than joining unlike observations.
        run: |
          nix develop --command env \
            BORZOI_REFERENCES_DIFF_OUT="$RUNNER_TEMP/reports/find-references-differential" \
            BORZOI_REFERENCES_DIFF_STRIDE=13 \
            cargo test -p borzoi --test all \
            handlers_references_corpus_diff::every_reported_corpus_reference_is_the_cursor_symbol_according_to_fcs \
            -- --ignored --nocapture

      - name: Add the current summaries to the workflow page
        run: |
          {
            echo '## Parser divergence'
            echo '```json'
            jq . "$RUNNER_TEMP/reports/parser-divergence/summary.json"
            echo '```'
            echo '## Resolution divergence'
            cat "$RUNNER_TEMP/reports/resolution-divergence/summary.txt"
            echo '## Find references differential'
            echo '```json'
            jq . "$RUNNER_TEMP/reports/find-references-differential/summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full measurement reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: measurement-reports-${{ github.sha }}
          path: ${{ runner.temp }}/reports
          if-no-files-found: error
          retention-days: 90
          overwrite: true

  persist:
    name: Persist observations
    needs: measure
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Build the publisher on this VM under the same pinned Nix environment
      # that will remain present while it runs. A binary built in another job
      # refers to that job's /nix/store ELF interpreter and cannot be copied to
      # a fresh runner by itself.
      - name: Move /nix and cargo's target/ to the large /mnt disk
        run: |
          df -h / /mnt || true
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
          sudo mkdir -p /mnt/cargo-target
          sudo chown "$(id -u):$(id -g)" /mnt/cargo-target
          mkdir -p "$GITHUB_WORKSPACE/target"
          sudo mount --bind /mnt/cargo-target "$GITHUB_WORKSPACE/target"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cargo target/
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cmd-format: nix develop -c {0}
          save-if: true

      - name: Build the history validator and dashboard generator
        run: |
          nix develop --command cargo build --locked -p borzoi-stats
          test -x "$GITHUB_WORKSPACE/target/debug/borzoi-stats"

      - name: Download full measurement reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: measurement-reports-${{ github.sha }}
          path: ${{ runner.temp }}/reports

      - name: Check out or initialise the stats-data branch
        env:
          HISTORY_DIR: ${{ runner.temp }}/stats-history
        run: |
          set +e
          git ls-remote --exit-code --heads origin refs/heads/stats-data >/dev/null
          status=$?
          set -e
          case "$status" in
            0)
              git fetch origin refs/heads/stats-data:refs/remotes/origin/stats-data
              git worktree add -B stats-data "$HISTORY_DIR" refs/remotes/origin/stats-data
              ;;
            2)
              git worktree add --orphan -b stats-data "$HISTORY_DIR"
              ;;
            *)
              echo "Could not determine whether origin/stats-data exists." >&2
              exit "$status"
              ;;
          esac

      - name: Record all observations
        env:
          HISTORY_DIR: ${{ runner.temp }}/stats-history
          REPOSITORY: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          corpus_revision="$(jq -er '.nodes["fsharp-src"].locked.rev' flake.lock)"
          flake_lock_hash="$(sha256sum flake.lock | cut -d ' ' -f 1)"
          measured_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          common=(
            --history "$HISTORY_DIR"
            --repository "$REPOSITORY"
            --commit "$COMMIT"
            --measured-at "$measured_at"
            --run-id "$RUN_ID"
            --run-number "$RUN_NUMBER"
            --run-attempt "$RUN_ATTEMPT"
            --corpus-revision "$corpus_revision"
            --flake-lock-hash "$flake_lock_hash"
          )
          "$GITHUB_WORKSPACE/target/debug/borzoi-stats" record \
            --summary "$RUNNER_TEMP/reports/parser-divergence/summary.json" \
            "${common[@]}"
          "$GITHUB_WORKSPACE/target/debug/borzoi-stats" record \
            --summary "$RUNNER_TEMP/reports/resolution-divergence/summary.json" \
            "${common[@]}"
          "$GITHUB_WORKSPACE/target/debug/borzoi-stats" record \
            --summary "$RUNNER_TEMP/reports/find-references-differential/summary.json" \
            "${common[@]}"

      - name: Commit and push the durable observations
        env:
          HISTORY_DIR: ${{ runner.temp }}/stats-history
        run: |
          git -C "$HISTORY_DIR" config user.name github-actions[bot]
          git -C "$HISTORY_DIR" config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C "$HISTORY_DIR" add observations
          if git -C "$HISTORY_DIR" diff --cached --quiet; then
            echo "The observation already has identical contents."
            git -C "$HISTORY_DIR" fetch origin refs/heads/stats-data:refs/remotes/origin/stats-data
            git -C "$HISTORY_DIR" merge --ff-only refs/remotes/origin/stats-data
          else
            git -C "$HISTORY_DIR" commit -m "stats: record ${GITHUB_SHA:0:12}"
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git -C "$HISTORY_DIR" push origin HEAD:stats-data; then
                pushed=true
                break
              fi
              echo "stats-data advanced while publishing; rebasing (attempt $attempt/5)." >&2
              git -C "$HISTORY_DIR" fetch origin \
                refs/heads/stats-data:refs/remotes/origin/stats-data
              if git -C "$HISTORY_DIR" merge-base HEAD refs/remotes/origin/stats-data >/dev/null; then
                git -C "$HISTORY_DIR" rebase refs/remotes/origin/stats-data
              else
                # Two jobs can both observe an absent branch during the first
                # publication. Replay this root commit over the winner's root.
                git -C "$HISTORY_DIR" rebase \
                  --onto refs/remotes/origin/stats-data --root
              fi
            done
            if [[ "$pushed" != true ]]; then
              echo "Could not publish stats-data after 5 attempts." >&2
              exit 1
            fi
          fi

  deploy:
    name: Deploy measurement dashboard
    needs: persist
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The shared `pages` lock covers the fetch, render, and deployment. Every
      # contender therefore renders the then-current branch tip; an older
      # measurement run that reaches this job late cannot deploy its old local
      # history snapshot over a newer one.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # This job can belong to an older measurement run. Resolve the branch
          # after acquiring the Pages lock so the validator and dashboard code
          # come from the current main tip, not that run's event SHA.
          ref: main

      - name: Move /nix and cargo's target/ to the large /mnt disk
        run: |
          df -h / /mnt || true
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
          sudo mkdir -p /mnt/cargo-target
          sudo chown "$(id -u):$(id -g)" /mnt/cargo-target
          mkdir -p "$GITHUB_WORKSPACE/target"
          sudo mount --bind /mnt/cargo-target "$GITHUB_WORKSPACE/target"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore cargo target/
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cmd-format: nix develop -c {0}
          save-if: false

      - name: Build the history validator and dashboard generator
        run: |
          nix develop --command cargo build --locked -p borzoi-stats
          test -x "$GITHUB_WORKSPACE/target/debug/borzoi-stats"

      - name: Check out the latest published history
        env:
          HISTORY_DIR: ${{ runner.temp }}/stats-history
        run: |
          git fetch origin refs/heads/stats-data:refs/remotes/origin/stats-data
          git worktree add --detach "$HISTORY_DIR" refs/remotes/origin/stats-data

      - name: Build the dashboard from the latest published history
        env:
          HISTORY_DIR: ${{ runner.temp }}/stats-history
          SITE_DIR: ${{ runner.temp }}/stats-site
        run: |
          "$GITHUB_WORKSPACE/target/debug/borzoi-stats" site \
            --history "$HISTORY_DIR" \
            --output "$SITE_DIR"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          name: github-pages-${{ github.run_attempt }}
          path: ${{ runner.temp }}/stats-site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
